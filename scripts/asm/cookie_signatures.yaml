# ============================================================================
# Cookie-name → vendor citation corpus (4.7 Q2/Q8b/R4, Obsidian 146)
# ============================================================================
# R4 provenance discipline: every device_fingerprints.yaml row whose observation
# is `set_cookie_names` and whose evidence_class is `vendor_identifying` MUST have
# a cited entry here, or the classifier REFUSES to start
# (derive_device_class.validate_cookie_citations). This is the machine guard that
# stops a cookie→vendor mapping shipping on our say-so — the same empirical bar
# that caught "cookiesession1 = wafw00f's FortiWeb signature" (it is NOT; wafw00f
# keys on FORTIWAFSID — see the correction below).
#
# Citation preference (strongest first):
#   vendor_primary_documentation  — the vendor documenting its own product's cookie
#   research_tool_source          — a WAF-detection tool's public signature DB
# Prefer primary; fall back to research-tool with a pinned/snapshotted source.
version: 1

cookie_signatures:
  # ── FortiWeb: cookiesession1 (PRIMARY vendor doc) ─────────────────────────
  # Fortinet's OWN admin guide documents FortiWeb emitting this Set-Cookie. This
  # is the independent signal that names FortiWeb where wafw00f cannot: wafw00f
  # never reads cookiesession1 (it keys on FORTIWAFSID + the block page), so
  # cookiesession1 + a wafw00f kind=fortiweb verdict are two INDEPENDENT tells
  # (4.7 R4-revised → together they reach 'confirmed').
  - cookie_name: cookiesession1
    vendor: Fortinet
    product: FortiWeb
    vendor_unique: true
    # vendor_unique inference: (a) Fortinet documents FortiWeb emitting it, plus
    # (b) no conflicting attribution in known-vendor cookie inventories. Revise if
    # a future observation shows a non-FortiWeb product emitting cookiesession1.
    citation:
      source_type: vendor_primary_documentation
      url: https://help.fortinet.com/fweb/582/Content/FortiWeb/fortiweb-admin/http_sessions_security.htm
      quote: "FortiWeb embeds a cookie in the response's Set-Cookie field in the HTTP header, which is named cookiesession1"
      snapshot_url: http://web.archive.org/web/20250608172301/https://help.fortinet.com/fweb/582/Content/FortiWeb/fortiweb-admin/http_sessions_security.htm
      corroboration:
        - https://community.fortinet.com/t5/FortiWeb/Technical-Tip-Enable-session-based-cookie-for-cookiesession1/ta-p/339895
        - https://docs.fortinet.com/document/fortiweb/7.6.0/administration-guide/415041/faq
      cited_at: 2026-07-20
      quote_provenance: "surfaced from the Fortinet FortiWeb admin guide via web search 2026-07-20; the live page is JS-rendered (not directly machine-fetchable) and the archive.org copy is fetch-blocked here — snapshot_url is the durable capture (2025-06-08), corroborated by the community + FAQ URLs above"

  # ── FortiWeb: FORTIWAFSID (research-tool source) — READY, NOT wired ────────
  # wafw00f's own FortiWeb signature cookie. Kept as a ready corpus entry but
  # deliberately NOT given a device_fingerprints row yet, because:
  #   (1) no asset we have observed serves it (act on observed evidence), and
  #   (2) wafw00f's verdict already keys on ^FORTIWAFSID=, so a direct row would
  #       read the SAME artifact as the wafw00f_high_confidence signal → 4.7
  #       same-artifact dedupe. When first observed, wire it UNDER the wafw00f
  #       signal name (dedupe_with_signal) so it can never double-count.
  - cookie_name: FORTIWAFSID
    vendor: Fortinet
    product: FortiWeb
    vendor_unique: true
    wired: false
    dedupe_with_signal: wafw00f_high_confidence
    citation:
      source_type: research_tool_source
      url: https://github.com/EnableSecurity/wafw00f/blob/master/wafw00f/plugins/fortiweb.py
      quote: "self.matchCookie(r'^FORTIWAFSID=')"
      cited_at: 2026-07-20
      note: "wafw00f is the source establishing FORTIWAFSID → FortiWeb; upgrade to a Fortinet primary-doc citation when one is located."
