# ============================================================================
# Device-class fingerprint registry — source of truth for derive_device_class.py
# ============================================================================
# Maps an observed signal to (device_class, vendor_product) and names which
# weighted signal (from classifier_thresholds.yaml) it satisfies. The classifier
# tallies matched signals per device_class and applies the D3 confidence bar.
# Data-driven so new appliances are a config commit, not a code change (mirrors
# cloud_providers.yaml). PR-reviewed alongside classifier_thresholds.yaml.
#
# MULTI-VENDOR BY DESIGN. Fortinet is only the SEED (the 2026-07-13 pilot handed
# us the SCI SSH banner, FortiWeb fwbbot_check, and the FortiWeb IP range first) —
# NOT the focus. The fleet also fronts through Automattic/Pressable (CMI, Unimac),
# Cloudflare (commanddigital), and cloud CDNs. An all-Fortinet classifier would
# leave every other edge stuck at 'unknown', so add rows per zone as characterized.
#
# CLOUD RECONCILIATION: do NOT fingerprint AWS / Google / Azure / Cloudflare-as-CDN
# here. derive_cloud_endpoint.py + is_cloud_endpoint already own those; the
# device-class runner INHERITS device_class='cloud_endpoint' when is_cloud_endpoint
# is true, instead of re-detecting them. This registry covers the appliance +
# managed-hosting edges the cloud classifier does NOT catch.
#
# ── EMPIRICAL EVIDENCE ONLY (Howie, 2026-07-18) ───────────────────────────────
# "Discard the entire concept of insider information. It is the most unreliable
#  piece of artifact or evidence that we have ... everything that we put on the
#  site needs to be derived from empirical evidence that we determine on our own."
#
# We scan from OUTSIDE. Anything we 'know' because we once operated the box is
# inadmissible here: it cannot be re-verified, and it goes stale SILENTLY (swap
# the appliance for another vendor and nothing in this pipeline would notice).
# Every row must therefore clear one of two bars:
#
#   VENDOR-IDENTIFYING -> may set {vendor, product}. The device identified
#     ITSELF: banner text naming it, its own challenge endpoint (fwbbot_check),
#     a wafw00f verdict, a vendor-named header, a cert CN naming the vendor,
#     a vendor-specific CVE/detection response.
#   PRESENCE-ONLY -> device_class only, `vendor_product: {}`. We can prove
#     something is in front of the asset but nothing names it. The portal then
#     renders "Behind a WAF", which is the whole truth and nothing more.
#
# NEVER encode a brand we merely infer. `family: *_suspected` was exactly that
# and is gone: it published a live "BEHIND FORTINET" badge off an SSH banner
# whose only actual content was the string "SCI". Presence-only is not a
# weaker answer, it is the correct one.
version: 1

# Each fingerprint:
#   signal        — MUST be a signal name in classifier_thresholds.yaml (sets its weight)
#   observation   — which raw observation kind the runner feeds (ssh_banner,
#                   waf_vendor, http_headers, cert_issuer, fwbbot_check, ips,
#                   nuclei_fortinet_hit)
#   match_*       — substrings (case-insensitive) / regex / ip_prefixes to test
#   device_class  — the topology role this evidence implies
#   vendor_product— optional {vendor, product, ...}. NOT merged: device_class_runner
#                   REPLACES assets.vendor_product wholesale on each --write pass
#                   (plain `vendor_product=%s::jsonb` assignment), so a key removed
#                   from a row here drains from the DB on the next write — no
#                   backfill needed. Verified 2026-07-18; the old "merged" wording
#                   here was wrong and implied a manual cleanup that isn't required.
fingerprints:

  # ── SSH management banner (HIGH) ─────────────────────────────────────────
  - signal: ssh_banner_appliance_match
    observation: ssh_banner
    match_substrings: ["_openssh sci", "8.1.0.0_openssh"]   # SCI-managed appliance firmware (.76 pilot)
    device_class: edge_firewall
    # PRESENCE-ONLY + operator. The banner ("SSH-2.0-8.1.0.0_openssh SCI")
    # empirically proves a customized, SCI-managed appliance firmware — the
    # string "SCI" is right there. It does NOT name a hardware vendor.
    # `family: fortinet_suspected` used to live here; it was insider knowledge,
    # not observation, and it rendered "BEHIND FORTINET" on ftp.sciimage.com.
    # Removed 2026-07-18. Re-earn the vendor only via a vendor-identifying
    # signal (JARM/TLS fingerprint, block page, cookie name, favicon hash).
    vendor_product: {managed_by: SCI}
  - signal: ssh_banner_appliance_match
    observation: ssh_banner
    match_regex: "fortissh|fortios|fortigate"
    device_class: edge_firewall
    vendor_product: {vendor: Fortinet, product: FortiGate}

  # ── WAF behavioral (HIGH) ────────────────────────────────────────────────
  - signal: fwbbot_check_challenge
    observation: fwbbot_check
    match_bool: true                                        # FortiWeb bot challenge (fwb = FortiWeb)
    device_class: waf
    vendor_product: {vendor: Fortinet, product: FortiWeb}
  - signal: wafw00f_high_confidence
    observation: waf_vendor
    match_substrings: ["fortiweb", "fortinet"]
    device_class: waf
    vendor_product: {vendor: Fortinet, product: FortiWeb}
  - signal: wafw00f_high_confidence
    observation: waf_vendor
    match_substrings: ["cloudflare"]
    device_class: waf
    vendor_product: {vendor: Cloudflare, product: Cloudflare}

  # ── Product HTTP header (HIGH) ───────────────────────────────────────────
  - signal: product_http_header
    observation: http_headers
    match_regex: "x-fortigate|fortiweb|fortiadc|server:\\s*forti"
    device_class: edge_firewall
    vendor_product: {vendor: Fortinet}

  # ── Cert issuer/subject pattern (MEDIUM) ─────────────────────────────────
  # A corp wildcard cert (e.g. GoDaddy *.sciimage.com) presented on an IP in the
  # corp range is consistent with a VIP / SSL-offload edge — a supporting, not
  # decisive, signal (it is equally consistent with a real origin).
  - signal: cert_issuer_subject_pattern
    observation: cert_issuer
    match_substrings: ["go daddy", "godaddy"]
    device_class: edge_firewall
    vendor_product: {}

  # ── IP in a known vendor edge/mgmt range (MEDIUM) ────────────────────────
  # 2026-07-18: vendor attribution REMOVED. This row previously asserted
  # {vendor: Fortinet, product: FortiWeb} and cited, as its source, a note
  # recording what we knew from having operated the pair. That is textbook
  # insider information: externally, an IP range attributes a NETBLOCK OWNER
  # via whois/ASN — never an appliance brand. Kept as presence-only so the
  # topology signal survives while the false brand claim does not.
  #
  # OPEN, for 4.7: the row's PREMISE ("this range is a WAF") is itself
  # insider-derived, so arguably the whole row should go. Deleting it changes
  # classification behavior, which D3 gates behind review — hence neutered now,
  # adjudicated next. Same question applies to the signal type generally.
  - signal: ip_in_vendor_mgmt_range
    observation: ips
    ip_prefixes: ["52.119.65."]
    device_class: waf
    vendor_product: {}

  # ── Fortinet-specific CVE detection response (MEDIUM) ────────────────────
  - signal: fortinet_cve_detection_response
    observation: nuclei_fortinet_hit
    match_bool: true
    device_class: edge_firewall
    vendor_product: {vendor: Fortinet}

  # ── Pressable / Automattic managed WP hosting edge (MEDIUM) ───────────────
  # NON-Fortinet edge (Howie 2026-07-13). Automattic fronts the WP origin; the
  # public surface is their edge (nginx + rate-based filtering — "Pressable
  # silently 403-filters"). Not an AWS/GCP/CF cloud endpoint, so it needs its own
  # rows here. cert-CN + IP range from the Unimac assessment. Two mediums = a
  # 'suspected' cdn today; promote the vendor-owned cert CN to a HIGH signal when
  # we want Pressable to reach 'confirmed'.
  - signal: cert_issuer_subject_pattern
    observation: cert_subject
    match_substrings: ["tls.automattic.com"]              # Pressable shared-hosting cert CN
    device_class: cdn
    vendor_product: {vendor: Automattic, product: Pressable}
  - signal: ip_in_vendor_mgmt_range
    observation: ips
    ip_prefixes: ["199.16.172.", "199.16.173."]           # Pressable shared-hosting range
    device_class: cdn
    vendor_product: {vendor: Automattic, product: Pressable}

  # ── Slots to characterize as the fleet is swept ──────────────────────────
  # Cloudflare acts as CDN (-> cloud_endpoint via the cloud classifier) AND a WAF;
  # add a waf-role row here only to distinguish its WAF from its CDN. Likewise
  # F5 BIG-IP (adc_lb), Palo Alto (edge_firewall), Imperva (waf) as they appear.

# ── Nuclei Fortinet template allowlist (4.7 E5) ───────────────────────────
# The nuclei_fortinet_hit signal fires ONLY on findings whose nuclei template-id
# starts with one of these prefixes — NOT a substring 'forti', which false-fires
# on 'fortify-*' (Fortify SCA, a different vendor). Precision > coverage.
nuclei_fortinet_templates:
  prefixes: [fortinet-, fortios-, fortiweb-, fortiadc-, fortisiem-, fortimail-]
  exclude:  [fortify-]

# NOTE: signal weights (which fingerprint satisfies which high/medium/low signal)
# are 4.7-ratified per D3. Changing a weight or threshold requires re-review
# before the soak clock resets — same discipline as classifier_thresholds.yaml.
