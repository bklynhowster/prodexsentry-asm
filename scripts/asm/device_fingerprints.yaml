# ============================================================================
# Device-class fingerprint registry — source of truth for derive_device_class.py
# ============================================================================
# Maps an observed signal to (device_class, vendor_product) and names which
# weighted signal (from classifier_thresholds.yaml) it satisfies. The classifier
# tallies matched signals per device_class and applies the D3 confidence bar.
# Data-driven so new appliances are a config commit, not a code change (mirrors
# cloud_providers.yaml). PR-reviewed alongside classifier_thresholds.yaml.
#
# MULTI-VENDOR BY DESIGN. Fortinet is only the SEED (the 2026-07-13 pilot handed
# us the SCI SSH banner, FortiWeb fwbbot_check, and the FortiWeb IP range first) —
# NOT the focus. The fleet also fronts through Automattic/Pressable (CMI, Unimac),
# Cloudflare (commanddigital), and cloud CDNs. An all-Fortinet classifier would
# leave every other edge stuck at 'unknown', so add rows per zone as characterized.
#
# CLOUD RECONCILIATION: do NOT fingerprint AWS / Google / Azure / Cloudflare-as-CDN
# here. derive_cloud_endpoint.py + is_cloud_endpoint already own those; the
# device-class runner INHERITS device_class='cloud_endpoint' when is_cloud_endpoint
# is true, instead of re-detecting them. This registry covers the appliance +
# managed-hosting edges the cloud classifier does NOT catch.
#
# ── EMPIRICAL EVIDENCE ONLY (Howie, 2026-07-18) ───────────────────────────────
# "Discard the entire concept of insider information. It is the most unreliable
#  piece of artifact or evidence that we have ... everything that we put on the
#  site needs to be derived from empirical evidence that we determine on our own."
#
# We scan from OUTSIDE. Anything we 'know' because we once operated the box is
# inadmissible here: it cannot be re-verified, and it goes stale SILENTLY (swap
# the appliance for another vendor and nothing in this pipeline would notice).
# Every row must therefore clear one of two bars:
#
#   VENDOR-IDENTIFYING -> may set {vendor, product}. The device identified
#     ITSELF: banner text naming it, its own challenge endpoint (fwbbot_check),
#     a wafw00f verdict, a vendor-named header, a cert CN naming the vendor,
#     a vendor-specific CVE/detection response.
#   PRESENCE-ONLY -> device_class only, `vendor_product: {}`. We can prove
#     something is in front of the asset but nothing names it. The portal then
#     renders "Behind a WAF", which is the whole truth and nothing more.
#
# NEVER encode a brand we merely infer. `family: *_suspected` was exactly that
# and is gone: it published a live "BEHIND FORTINET" badge off an SSH banner
# whose only actual content was the string "SCI". Presence-only is not a
# weaker answer, it is the correct one.
version: 1

# Each fingerprint:
#   signal        — MUST be a signal name in classifier_thresholds.yaml (sets its weight)
#   observation   — which raw observation kind the runner feeds (ssh_banner,
#                   waf_vendor, http_headers, cert_issuer, cert_subject,
#                   fwbbot_check, nuclei_fortinet_hit)
#   evidence_class— REQUIRED (4.7 R6, 2026-07-18). One of:
#                     vendor_identifying — the artifact NAMES the vendor; may set
#                                          vendor_product.{vendor[,product]}.
#                     presence_only      — proves something is there but names no
#                                          vendor; vendor_product must carry NO
#                                          vendor/product (operator metadata such
#                                          as managed_by IS allowed).
#                   Enforced at classifier startup AND in CI by
#                   derive_device_class.validate_fingerprints() — a row that sets
#                   a vendor without vendor_identifying, or claims
#                   vendor_identifying with no vendor, makes the classifier refuse
#                   to start. This is the machine guard that stops an inferred
#                   brand ever going back in by hand (the family:fortinet_suspected
#                   class of bug).
#   match_*       — substrings (case-insensitive) / regex to test
#   device_class  — the topology role this evidence implies
#   vendor_product— optional {vendor, product, managed_by, ...}. NOT merged:
#                   device_class_runner REPLACES assets.vendor_product wholesale on
#                   each --write pass (plain `vendor_product=%s::jsonb`), so a key
#                   removed from a row here drains from the DB on the next write —
#                   no backfill needed (verified 2026-07-18).
#
# NOTE (2026-07-18): the `ips`/ip_prefixes observation was REMOVED. An IP range
# attributes a NETBLOCK OWNER (whois/ASN), never an appliance brand or role — the
# F1–F7 cloud_provider path already owns ASN/CNAME ownership, authoritatively. The
# two ip_in_vendor_mgmt_range rows that lived here (52.119.65 "FortiWeb pair";
# 199.16.172/173 Pressable) were also DEAD: gather_observations never emitted an
# `ips` key, so they matched zero assets. Deleted under 4.7 R1/R2.
fingerprints:

  # ── SSH management banner (HIGH) ─────────────────────────────────────────
  - signal: ssh_banner_appliance_match
    observation: ssh_banner
    match_substrings: ["_openssh sci", "8.1.0.0_openssh"]   # SCI = Command's own legacy name (see below)
    device_class: edge_firewall
    evidence_class: presence_only
    # PRESENCE-ONLY, first-party. The banner ("SSH-2.0-8.1.0.0_openssh SCI")
    # empirically proves a customized appliance firmware whose banner echoes the
    # string "SCI". SCI (Strategic Content Imaging) is Command's OWN decades-old
    # company name — SCI *is* Command Companies/Command Digital, the asset owner,
    # NOT a vendor and NOT a third-party manager. So this is the owner naming
    # itself: first-party self-identification, the most trustworthy external
    # evidence there is — and precisely why there is no vendor to name.
    # `family: fortinet_suspected` used to live here; it was insider knowledge,
    # not observation, and it rendered "BEHIND FORTINET" on ftp.sciimage.com.
    # Removed 2026-07-18. Re-earn a *vendor* only via a vendor-identifying signal
    # (JARM/TLS fingerprint, block page, cookie name, favicon hash). managed_by
    # stays as operator metadata (allowed under presence_only); it is NOT a vendor.
    vendor_product: {managed_by: SCI}
  - signal: ssh_banner_appliance_match
    observation: ssh_banner
    match_regex: "fortissh|fortios|fortigate"                # banner literally names FortiOS/FortiGate
    device_class: edge_firewall
    evidence_class: vendor_identifying
    vendor_product: {vendor: Fortinet, product: FortiGate}

  # ── WAF behavioral (HIGH) ────────────────────────────────────────────────
  # NOTE (2026-07-18): the fwbbot_check + waf_vendor observations are not yet
  # emitted by gather_observations (run_medium computes ctx.waf_kind but nothing
  # persists it — the E1 gap), so these rows are DORMANT today. They are kept,
  # not deleted, because they ARE empirical/vendor-identifying (the device names
  # itself) — they light up the moment E1 wires the observation. This is the
  # opposite of the ip_range rows, which were deleted: those could never be
  # anything but insider inference.
  # 4.7 Q1 rename 2026-07-20 (vendor + artifact explicit in the name). Cited in
  # artifact_signatures.yaml (challenge_endpoint_path). DORMANT until the
  # active-probe `fwbbot_check` observation is wired (Phase B/D); corroborating
  # context required at wire time (4.7 Q7). Detect the challenge, never solve it.
  - signal: fortiweb_challenge_endpoint_fwbbot_check
    observation: fwbbot_check
    match_bool: true                                        # FortiWeb Real-Browser-Enforcement challenge path — FortiWeb INJECTS /fwbbot_check; origin lacks it
    device_class: waf
    evidence_class: vendor_identifying
    vendor_product: {vendor: Fortinet, product: FortiWeb}
  - signal: wafw00f_high_confidence
    observation: waf_vendor
    match_substrings: ["fortiweb", "fortinet"]              # wafw00f positively fingerprints the vendor
    device_class: waf
    evidence_class: vendor_identifying
    vendor_product: {vendor: Fortinet, product: FortiWeb}
  - signal: wafw00f_high_confidence
    observation: waf_vendor
    match_substrings: ["cloudflare"]
    device_class: waf
    evidence_class: vendor_identifying
    vendor_product: {vendor: Cloudflare, product: Cloudflare}

  # ── wafw00f WAF presence (HIGH, presence-only) — 4.7 Q1 (Obsidian 146) ────
  # wafw00f (a 150-signature purpose-built WAF detector) fired but named no
  # vendor: a WAF is present, nothing more. PRESENCE-ONLY — the honest "Behind a
  # WAF" answer. Fed by gather_observations obs `waf_present`, which is emitted
  # ONLY when wafw00f detected==true AND named no vendor kind — so it never
  # double-counts the same wafw00f run against a wafw00f_high_confidence vendor
  # row (4.7 same-artifact test). This is what lifts a generic-WAF asset off
  # 'unknown'.
  - signal: waf_present_wafw00f
    observation: waf_present
    match_bool: true
    device_class: waf
    evidence_class: presence_only
    vendor_product: {}

  # ── FortiWeb cookiesession1 (HIGH, vendor-identifying) — 4.7 Q2/R4 ────────
  # Fortinet's OWN docs document FortiWeb emitting the cookiesession1 Set-Cookie
  # (see artifact_signatures.yaml — vendor_primary_documentation; the classifier
  # refuses to start if that citation is missing). EXACT match (4.7 Q8e): a
  # cookie name is a discrete token — substring would false-match cookiesession1234.
  # INDEPENDENT of wafw00f (4.7 R4-revised): wafw00f keys on FORTIWAFSID + the
  # block page, NEVER cookiesession1, so cookiesession1 + a wafw00f kind=fortiweb
  # verdict are two independent tells that reach 'confirmed'. Fed by obs
  # `set_cookie_names` (from the browser-UA passive collector).
  - signal: fortiweb_cookiesession1
    observation: set_cookie_names
    match_semantic: exact
    match_values: ["cookiesession1"]
    device_class: waf
    evidence_class: vendor_identifying
    vendor_product: {vendor: Fortinet, product: FortiWeb}

  # ── Product HTTP header (HIGH) ───────────────────────────────────────────
  - signal: product_http_header
    observation: http_headers
    match_regex: "x-fortigate|fortiweb|fortiadc|server:\\s*forti"   # vendor-named response header
    device_class: edge_firewall
    evidence_class: vendor_identifying
    vendor_product: {vendor: Fortinet}

  # ── Cert issuer/subject pattern (MEDIUM) ─────────────────────────────────
  # A corp wildcard cert (e.g. GoDaddy *.sciimage.com) is consistent with a VIP /
  # SSL-offload edge — a supporting, not decisive, signal (equally consistent with
  # a real origin), and it names no vendor -> presence_only.
  - signal: cert_issuer_subject_pattern
    observation: cert_issuer
    match_substrings: ["go daddy", "godaddy"]
    device_class: edge_firewall
    evidence_class: presence_only
    vendor_product: {}

  # ── Fortinet-specific CVE detection response (MEDIUM) ────────────────────
  - signal: fortinet_cve_detection_response
    observation: nuclei_fortinet_hit
    match_bool: true                                        # response to a Fortinet-specific detection template
    device_class: edge_firewall
    evidence_class: vendor_identifying
    vendor_product: {vendor: Fortinet}

  # ── Automattic managed WP hosting edge (MEDIUM) ───────────────────────────
  # NON-Fortinet edge. Automattic fronts the WP origin; the public surface is
  # their edge (nginx + rate-based filtering — "Pressable silently 403-filters").
  # Not an AWS/GCP/CF cloud endpoint, so it needs its own row.
  #
  # R3 (4.7, 2026-07-18): vendor=Automattic ONLY, product DROPPED. The cert CN
  # "tls.automattic.com" empirically names Automattic (the ORG that owns the
  # edge) — admissible, vendor-identifying. It does NOT name which Automattic
  # product (Pressable / WordPress.com / WooCommerce / Jetpack) serves the asset,
  # so "Pressable" was an inference and is gone. Re-earn product only via a
  # product-specific signal (e.g. an "X-Cache-Group: pressable" header).
  # Single medium today -> stays below the 'suspected' bar in production
  # (>=2 medium required); promote the cert CN to a vendor-identifying HIGH
  # signal, or add a 2nd Automattic medium, to reach the bar. Weight change =
  # D3 re-review + soak reset, deferred.
  - signal: cert_issuer_subject_pattern
    observation: cert_subject
    match_substrings: ["tls.automattic.com"]              # Automattic-owned shared-hosting cert CN
    device_class: cdn
    evidence_class: vendor_identifying
    vendor_product: {vendor: Automattic}

  # ── Slots to characterize as the fleet is swept ──────────────────────────
  # Cloudflare acts as CDN (-> cloud_endpoint via the cloud classifier) AND a WAF;
  # add a waf-role row here only to distinguish its WAF from its CDN. Likewise
  # F5 BIG-IP (adc_lb), Palo Alto (edge_firewall), Imperva (waf) as they appear.

# ── Nuclei Fortinet template allowlist (4.7 E5) ───────────────────────────
# The nuclei_fortinet_hit signal fires ONLY on findings whose nuclei template-id
# starts with one of these prefixes — NOT a substring 'forti', which false-fires
# on 'fortify-*' (Fortify SCA, a different vendor). Precision > coverage.
nuclei_fortinet_templates:
  prefixes: [fortinet-, fortios-, fortiweb-, fortiadc-, fortisiem-, fortimail-]
  exclude:  [fortify-]

# NOTE: signal weights (which fingerprint satisfies which high/medium/low signal)
# are 4.7-ratified per D3. Changing a weight or threshold requires re-review
# before the soak clock resets — same discipline as classifier_thresholds.yaml.
