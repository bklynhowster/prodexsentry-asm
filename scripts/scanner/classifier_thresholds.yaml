# ============================================================================
# Device-class classifier thresholds — 4.7 D3 (2026-07-13)
# ============================================================================
# PR-REVIEWED CONFIG. NOT runtime-modifiable. The classifier READS this and
# never writes it; changing any weight or threshold requires a reviewed commit.
# Anchoring the bar here (not in code constants a caller can tweak) is the guard
# against "lower confirmed to 1-signal for more coverage" drift (4.7 risk #1).
#
# Only a CONFIRMED device_class may change scan routing (4.7 D3/D4). suspected
# renders in the portal for review but never reroutes. A class assignment built
# only from stale evidence (older than evidence_freshness_days) does not clear
# the bar — forcing periodic reclassification.
version: 1

# --- Signals, by independent strength --------------------------------------
signals:
  high:
    - ssh_banner_appliance_match       # SSH banner matches a known appliance fingerprint (e.g. "8.1.0.0_openssh SCI")
    - product_http_header              # distinct product header (Server: FortiADC, X-FortiGate-Firmware, ...)
    - fortiweb_challenge_endpoint_fwbbot_check   # 4.7 Q1: active-probe observes FortiWeb's /fwbbot_check challenge (dormant until Phase B/D)
    - wafw00f_high_confidence          # wafw00f positively NAMES a vendor (fortiweb/cloudflare) at high confidence
    - waf_present_wafw00f              # 4.7 Q1: wafw00f detected a WAF but named no vendor — presence-only "Behind a WAF"
    - waf_present_differential         # 4.7 Cloud Armor: differential probe (>=2 payload classes block, benign passes) proves WAF presence; presence-only, NO vendor (DORMANT until Phase-B collector)
    - fortiweb_cookiesession1          # 4.7 Q2: FortiWeb cookiesession1 Set-Cookie (Fortinet primary-doc cited), independent of wafw00f
    # ── Discovery-tier wafw00f (Obsidian 157, 4.7 2026-07-23) ──────────────────
    # WAF verdict from the LIGHT/discovery scan (asset_surface.surface_data.subdomains[].waf),
    # NOT the heavy stack_id_wafw00f artifact. Same tool, lower operating envelope (reduced
    # rate/depth, unauth, single-pass). Capped at 'suspected' naturally: one high signal =
    # suspected (needs a 2nd INDEPENDENT tell for confirmed). Deduped against heavy wafw00f
    # via dedupe_key: wafw00f_detection so heavy+discovery count ONCE (4.7 Q2). Lifts the
    # FortiWeb estate off 'unknown' with no per-host heavy scan (4.7 Q1).
    - wafw00f_discovery_confidence     # discovery wafw00f NAMES a vendor (fortiweb/cloudflare) — high, dedupes w/ heavy
    # waf_present_discovery_wafw00f REMOVED (157 dry-run, 4.7 2026-07-23): discovery GENERIC
    # wafw00f false-positived 19 assets + downgraded 9 confirmed cloud classes. Named-vendor only.
    # Cloud-native edges (4.7 cloud-edge phase, safe-alone) — each is one self-naming
    # response header = 1 high = 'suspected'; a 2nd independent header tell (deferred,
    # AND-matching) is required for 'confirmed'. All cited in artifact_signatures.yaml.
    # google_frontend_server_header REMOVED 2026-07-20 (Howie): GFE = GCP's own front
    # door, not a discretionary edge; naming it just restates cloud_provider=GCP.
    - cloudflare_cf_ray_header         # CF-RAY -> Cloudflare (cdn)
    - cloudfront_amz_cf_id_header      # X-Amz-Cf-Id -> AWS CloudFront (cdn)
    - azure_frontdoor_ref_header       # X-Azure-Ref -> Azure Front Door (cdn)
    - automattic_x_ac_edge_cache_header  # X-AC -> Automattic/Pressable edge cache (cdn); Pressable-KB cited (Obsidian 153, 2026-07-22)
  medium:
    - cert_issuer_subject_pattern      # e.g. a GoDaddy wildcard cert, or a vendor-named cert CN
    # ip_in_vendor_mgmt_range DELETED 2026-07-18 (4.7 R1): an IP range attributes a
    # netblock owner (whois/ASN), never an appliance brand/role — the cloud_provider
    # path (F1-F7) already owns ASN/CNAME ownership. Signal type retired to stop reuse.
    - fortinet_cve_detection_response  # response to a Fortinet-specific CVE-detection template (detection, not exploit)
  low:
    - port_pattern                     # appliance-like port set (weak alone)
    - tcp_timing_fingerprint           # response timing / TCP fingerprint

# --- Confidence bar (4.7 D3) -----------------------------------------------
# Evaluated over signals no older than evidence_freshness_days.
thresholds:
  confirmed: ">=2 high  OR  (>=1 high AND >=2 medium)"
  suspected: "1 high  OR  >=2 medium"
  unknown:   "0 signals, or low-weight only"

# --- Freshness + drift guards ----------------------------------------------
evidence_freshness_days: 30          # signals older than this do not count toward the bar
class_transition_alert: true         # any scan-over-scan change of a CONFIRMED class fires a WATCH alert (4.7 D3)
routing_requires: confirmed          # only this confidence level may change scan routing (4.7 D4)
