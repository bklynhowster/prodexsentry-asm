version: 2
defaults:
  schedule: nightly
  rate_limit: normal
  notify_on:
    - critical
    - high
  retain_history_days: 365
# ─── Prodex Labs targets ─────────────────────────────────────────────
# Each entry is an AUTHORIZED apex. scope_verified: true = Prodex owns it /
# written authorization to scan exists. asm-discover.sh refuses any target
# not marked scope_verified: true.
targets:
  - id: prodexlabs
    type: apex
    value: prodexlabs.com
    scope_verified: true
    owner: prodex_labs
    tags:
      - production
      - public-facing
    notes: Prodex Labs primary domain. Authorized by Howie Schneider (incoming CISO), full permission, 2026-07-02.
